<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Fonts Demo</title>
    <link rel="icon" type="image/svg+xml" href="uxdx-icon.svg">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <img src="uxdx-icon.svg" alt="UXDX Logo" class="header-icon">
                <div>
                    <h1>Variable Fonts Demo</h1>
                    <div class="upload-section">
                        <button class="font-toggle active" data-font="google-sans-flex">Google Sans Flex</button>
                        <button class="font-toggle" data-font="sixtyfour">Sixtyfour</button>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div class="content-wrapper">
                <div>
                    <div class="display-text" id="display-text">
                        UXDX Oslo<br>Fonts: Clay to Pixels
                    </div>
                    <div class="animation-controls">
                        <div class="color-checkbox-container">
                            <label class="color-checkbox">
                                <input type="checkbox" id="animate-colors">
                                <span>Animate Colors</span>
                            </label>
                        </div>
                        <button id="animate-btn" class="animate-btn">✨ Animate</button>
                    </div>
                </div>

                <div class="controls-section">
                    <h2>Font Variation Axes</h2>
                    <div id="axes-container" class="axes-container"></div>
                </div>
            </div>

            <div class="info-section">
                <h3>Current Settings</h3>
                <code id="font-settings"></code>
            </div>
        </main>
    </div>

    <script src="index.js"></script>
</body>
</html>
